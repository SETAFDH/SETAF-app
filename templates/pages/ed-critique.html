        <div class="splash"/>
        <script>
            let lastRoot = null;
            
            function run() {
                const rootValue = new URL(window.location.href).searchParams.get("root");
              
                if (!rootValue || rootValue === lastRoot) return;
                lastRoot = rootValue;
              
                const match = [...document.querySelectorAll("pb-link")]
                  .find(el =&gt; el.getAttribute("node-id") === rootValue);
              
                const text = match?.textContent.trim();
              
                var cP = document.getElementById("currentPage");
                cP.innerHTML = "Page du fac-similé affichée : " + text
            }
            
            const originalPushState = history.pushState;
                history.pushState = function () {
                  originalPushState.apply(this, arguments);
                  run();
            };
            
            const originalReplaceState = history.replaceState;
                history.replaceState = function () {
                  originalReplaceState.apply(this, arguments);
                  run();
            };
            
            window.addEventListener("popstate", run);
            run();
        </script>
