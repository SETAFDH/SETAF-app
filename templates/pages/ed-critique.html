                            <h1>Titre long</h1>
                            <span>Les faitz de Jésus Christ et du pape, par lesquelz chascun pourra facilement congnoistre la grande différence d'entre eulx, nouvellement reveuz, corrigez, et augmentez selon la verité de la saincte Escripture, et des droictz canons, par le lecteur du sainct Palais.</span>

                            <h2><pb-i18n>Contenus</pb-i18n></h2>
                            
                            <ul class="listContents">
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.3.3">Page de titre</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.7.3">Épître</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.9.3">Frontispice</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.11.4.4">Jesus Christ fuyt le royaume terrien.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.11.6.4">Mais le Pape par force le faict sien.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.13.4.4">Jesus d'espine si est couronné piteusement.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.13.6.4">Et le Pape de pierrerie et or somptueusement.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.15.4.4">Jesus a ses disciples lave les piedz.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.15.6.4">Mais ceulx du Pape par les Roys sont baiséz.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.17.4.4">Jesus Christ paie tribut et toutes impositions.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.17.6.4">Les papistiques de tout sont francz par fulminations.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.19.4.4">Christ humble aux malades donne guerison.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.19.6.4">L'orgueil du Pape s'esjouyt en occision.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.21.4.4">Jesus porte sa croix en grand douleur.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.21.6.4">Le Pape est porté en grand honneur.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.23.4.4">Jesus donne à ses brebis la pasture.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.23.6.4">Le Pape n'a que de sa pance cure.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.25.4.4">En paovreté/ et paix Jesus est né.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.25.6.4">L'orgueilleux Pape a guerre est addonné.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.27.4.4">Sur l'asne vient Jesus doulx et bening.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.27.6.4">Le Pape aux champs sur gros roncin.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.29.4.4">Jesus toute avarice aux Apostres deffend.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.29.6.4">Mais le Pape les biens du monde prent.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.31.6.4">Jesus aux choses externes point ne s'arreste.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.31.8.4">Le Pape d'icelles tant seulement nous faict feste.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.33.6.4">Du temple Jesus chasse tous usuriers.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.33.8.4">Ausquelz le Pape tout livre pour deniers.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.35.4.4">Ès cieulx veult Jesus que soit nostre thresor.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.35.6.4">Sur terre ne demande l'autre que or.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.37.4.4">Jesus repaist ses brebis amiablement.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.37.6.4">Le Pape les devore tres cruellement.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.39.4.4">Jesus sa Cene ordonne/en memoyre de sa mort et passion.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.39.6.4">Et le Pape la messe controuve/chief de toute abusion.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.41.4.4">Jesus ès cieulx monte en toute liesse.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.41.6.4">Le Pape en enfert tombe en grand destresse.</pb-link></li>
                                <li><pb-link emit="transcription" subscribe="transcription" node-id="3.6.2.43.3">Aux lecteurs Epistre proffitable.</pb-link></li>
                            </ul>
